name: Test http-proxy input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: test-key-id
      AWS_SECRET_ACCESS_KEY: test-secret-key
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          http-proxy: "http://proxy.example.com:8080"
          registry-type: private
          skip-logout: 'true'
          mask-password: 'false'
      - name: Assert action was attempted with http-proxy input
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          # The action is expected to fail without real AWS credentials,
          # but it must have been invoked (outcome is not 'skipped').
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped, expected it to run"
            exit 1
          fi
          echo "PASS: action ran with http-proxy input"
