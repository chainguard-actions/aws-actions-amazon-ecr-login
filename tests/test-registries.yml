name: Test ECR Login - Multiple Registries Input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
      AWS_ACCESS_KEY_ID: AKIAIOSFODNN7EXAMPLE
      AWS_SECRET_ACCESS_KEY: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          registry-type: private
          registries: '123456789012,234567890123'
          skip-logout: 'true'
          mask-password: 'false'
        continue-on-error: true
      - name: Assert action was invoked with registries input
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action was invoked with registries input (outcome: ${{ steps.action.outcome }})"
