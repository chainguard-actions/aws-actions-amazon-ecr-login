name: Test registries input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: fake-access-key
      AWS_SECRET_ACCESS_KEY: fake-secret-key
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          registries: "123456789012,987654321098"
          registry-type: private
          mask-password: 'true'
          skip-logout: 'true'
      - name: Assert action ran (expected failure due to fake credentials)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ] && [ "$OUTCOME" != "success" ]; then
            echo "FAIL: expected outcome to be 'failure' or 'success', got '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action ran with registries input (outcome: $OUTCOME)"
